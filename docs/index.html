<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Context Forge</title>

<style>
body {
  margin:0;
  font-family: system-ui, -apple-system, sans-serif;
  background:#0f172a;
  color:#fff;
  overflow-x:hidden;
}

/* ===== Background ===== */
.bg {
  position:fixed;
  inset:0;
  z-index:-1;
}

.blob {
  position:absolute;
  width:500px;
  height:500px;
  filter:blur(120px);
  opacity:0.2;
  border-radius:50%;
  animation:float 18s infinite ease-in-out;
}

.b1{background:#6366f1;top:-100px;left:-100px;}
.b2{background:#06b6d4;top:30%;right:-150px;animation-delay:-5s;}
.b3{background:#8b5cf6;bottom:-150px;left:30%;animation-delay:-10s;}

@keyframes float {
  0%,100%{transform:translate(0,0);}
  50%{transform:translate(60px,-40px);}
}

/* ===== Layout ===== */
header {
  display:flex;
  justify-content:space-between;
  padding:16px 24px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
}

.logo {font-weight:700;}

.container {
  display:grid;
  grid-template-columns:220px 1fr;
  min-height:100vh;
}

nav {
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.1);
}

nav button {
  width:100%;
  margin-bottom:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:transparent;
  color:white;
  cursor:pointer;
}

nav button.active {
  background:rgba(99,102,241,0.3);
}

main {
  padding:24px;
}

/* ===== Cards ===== */
.card {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
  transition:0.2s;
}

.card:hover {
  transform:translateY(-4px);
}

/* ===== Inputs ===== */
textarea, input {
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.2);
  background:#0b1220;
  color:white;
}

/* ===== Buttons ===== */
button.primary {
  background:linear-gradient(90deg,#6366f1,#06b6d4);
  border:none;
  padding:10px 14px;
  border-radius:10px;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

/* ===== Output ===== */
.output {
  margin-top:12px;
  padding:12px;
  background:#020617;
  border-radius:10px;
  min-height:40px;
  white-space:pre-wrap;
}

/* ===== Loader ===== */
.loader {
  height:14px;
  background:linear-gradient(90deg,#1e293b,#334155,#1e293b);
  background-size:200% 100%;
  animation:shimmer 1.2s infinite;
  border-radius:8px;
}

@keyframes shimmer {
  0%{background-position:200% 0;}
  100%{background-position:-200% 0;}
}

/* ===== Toast ===== */
#toast {
  position:fixed;
  right:20px;
  bottom:20px;
  z-index:999;
}

.toast {
  background:rgba(15,23,42,0.9);
  border:1px solid rgba(255,255,255,0.1);
  padding:10px 14px;
  margin-top:10px;
  border-radius:10px;
  opacity:0;
  transform:translateY(10px);
  transition:0.3s;
}

.toast.show {
  opacity:1;
  transform:translateY(0);
}

/* ===== Pages ===== */
.page {display:none;}
.page.active {display:block;}
</style>
</head>

<body>

<div class="bg">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>

<div id="toast"></div>

<header>
  <div class="logo">Context Forge</div>
  <button class="primary" onclick="exportData()">Export</button>
</header>

<div class="container">

<nav>
  <button class="tab active" onclick="show('dashboard')">Dashboard</button>
  <button class="tab" onclick="show('extractor')">Extractor</button>
  <button class="tab" onclick="show('optimizer')">Optimizer</button>
  <button class="tab" onclick="show('evaluator')">Evaluator</button>
  <button class="tab" onclick="show('playground')">Playground</button>
</nav>

<main>

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
  <div class="card">
    <h3>System Status</h3>
    <p>Context Forge running stable</p>
  </div>
</div>

<!-- EXTRACTOR -->
<div id="extractor" class="page">
  <div class="card">
    <h3>Extractor</h3>
    <textarea id="extractText"></textarea>
    <button class="primary" onclick="extract()">Extract</button>
    <div class="output" id="extractOut"></div>
  </div>
</div>

<!-- OPTIMIZER -->
<div id="optimizer" class="page">
  <div class="card">
    <h3>Optimizer</h3>
    <textarea id="optText"></textarea>
    <button class="primary" onclick="optimize()">Optimize</button>
    <div class="output" id="optOut"></div>
  </div>
</div>

<!-- EVALUATOR -->
<div id="evaluator" class="page">
  <div class="card">
    <h3>Evaluator</h3>
    <textarea id="evalText"></textarea>
    <button class="primary" onclick="evaluateCtx()">Evaluate</button>
    <div class="output" id="evalOut"></div>
  </div>
</div>

<!-- PLAYGROUND -->
<div id="playground" class="page">
  <div class="card">
    <h3>Playground</h3>
    <textarea id="chatText"></textarea>
    <button class="primary" onclick="chat()">Run</button>
    <div class="output" id="chatOut"></div>
  </div>
</div>

</main>
</div>

<script>

const API = "https://context-forge-api.iggy-mw.workers.dev";

function show(page){
  document.querySelectorAll(".page")
    .forEach(p=>p.classList.remove("active"));

  document.getElementById(page).classList.add("active");
}

function toast(msg){
  const el=document.createElement("div");
  el.className="toast";
  el.innerText=msg;
  document.getElementById("toast").appendChild(el);
  setTimeout(()=>el.classList.add("show"),10);
  setTimeout(()=>el.remove(),2500);
}

function loading(el){
  el.innerHTML = `<div class="loader"></div>`;
}

function render(el,text){
  el.textContent = text || "[no response]";
}

async function call(endpoint, body){
  const res = await fetch(API + endpoint, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify(body)
  });
  return res.json();
}

/* ===== Extract ===== */
async function extract(){
  const out=document.getElementById("extractOut");
  loading(out);

  const res = await call("/extract",{
    text:document.getElementById("extractText").value
  });

  render(out,res.context);
  toast("Extracted");
}

/* ===== Optimize ===== */
async function optimize(){
  const out=document.getElementById("optOut");
  loading(out);

  const res = await call("/optimize",{
    text:document.getElementById("optText").value
  });

  render(out,res.optimized);
  toast("Optimized");
}

/* ===== Evaluate ===== */
async function evaluateCtx(){
  const out=document.getElementById("evalOut");
  loading(out);

  const res = await call("/evaluate",{
    text:document.getElementById("evalText").value
  });

  render(out,res.evaluation);
  toast("Evaluated");
}

/* ===== Chat ===== */
async function chat(){
  const out=document.getElementById("chatOut");
  loading(out);

  const res = await call("/chat",{
    prompt:document.getElementById("chatText").value
  });

  render(out,res.response);
}

/* ===== Export ===== */
function exportData(){
  const blob = new Blob([JSON.stringify(localStorage)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="context-forge.json";
  a.click();
}

</script>

</body>
</html>
